<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayesian Covariance Decomposition</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2023.11.1/core.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f9f9f9;}
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .controls { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .slider-group { display: flex; flex-direction: column; flex: 1; min-width: 200px; }
        label { font-weight: bold; margin-bottom: 5px; color: #333; }
        input[type=range] { width: 100%; }
        .val-display { font-weight: normal; color: #0066cc; }
        #plot-container { width: 100%; overflow-x: auto; display: flex; justify-content: center; }
        .header { text-align: center; margin-bottom: 30px; }
        .pdf-btn { display: inline-block; background: #0366d6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px;}
        .pdf-btn:hover { background: #0052cc; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Bayesian Posterior Covariance Decomposition</h1>
        <p>Interact with the sliders to observe how uncertainty shifts from Aleatoric (noise) to Epistemic (data insufficiency) as the model capacity crosses the interpolation threshold.</p>
        <a href="link_to_your_report.pdf" class="pdf-btn" target="_blank">Read the Full Report (PDF)</a>
    </div>

    <div class="card">
        <div class="controls">
            <div class="slider-group">
                <label>Model Features (d): <span id="d-val" class="val-display">15</span></label>
                <input type="range" id="d-slider" min="2" max="25" value="15" step="1">
            </div>
            <div class="slider-group">
                <label>Training Points (n): <span id="n-val" class="val-display">15</span></label>
                <input type="range" id="n-slider" min="5" max="30" value="15" step="1">
            </div>
            <div class="slider-group">
                <label>Aleatoric Noise (σ²): <span id="sig-val" class="val-display">2.25</span></label>
                <input type="range" id="sig-slider" min="0.5" max="5.0" value="2.25" step="0.25">
            </div>
            <div class="slider-group">
                <label>Prior Variance (τ²): <span id="tau-val" class="val-display">4.0</span></label>
                <input type="range" id="tau-slider" min="0.5" max="10.0" value="4.0" step="0.5">
            </div>
        </div>
        <div id="plot-container">
            </div>
    </div>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <script type="py">
        import numpy as np
        import matplotlib.pyplot as plt
        from pyscript import document
        from pyodide.ffi import create_proxy

        # Initial Setup
        total_features = 25
        t_test = np.linspace(0, 1, 200)

        def get_fourier_design_matrix(t, d_features):
            M = np.ones((len(t), d_features))
            for j in range(1, d_features):
                freq = (j + 1) // 2
                if j % 2 == 1: M[:, j] = np.cos(2 * np.pi * freq * t)
                else: M[:, j] = np.sin(2 * np.pi * freq * t)
            return M
        
        M_all_test = get_fourier_design_matrix(t_test, total_features)

        def update_plot(event=None):
            # 1. Get values from HTML sliders
            d = int(document.getElementById('d-slider').value)
            n_train = int(document.getElementById('n-slider').value)
            sigma_sq = float(document.getElementById('sig-slider').value)
            tau_sq = float(document.getElementById('tau-slider').value)
            
            sigma = np.sqrt(sigma_sq)
            tau = np.sqrt(tau_sq)
            lam = sigma_sq / tau_sq

            # Update labels
            document.getElementById('d-val').innerText = str(d)
            document.getElementById('n-val').innerText = str(n_train)
            document.getElementById('sig-val').innerText = str(sigma_sq)
            document.getElementById('tau-val').innerText = str(tau_sq)

            # 2. Generate Data
            np.random.seed(42) # Keep seed fixed so plot doesn't jump randomly
            t_train = np.sort(np.random.rand(n_train))
            theta_true = np.random.normal(0, sigma, total_features)
            M_all_train = get_fourier_design_matrix(t_train, total_features)
            
            y_train = M_all_train @ theta_true
            y_test_true = M_all_test @ theta_true

            # 3. Calculations
            M_TM = M_all_train[:, :d]
            M_test_M = M_all_test[:, :d]

            Precision = M_TM.T @ M_TM + lam * np.eye(d)
            Sigma_post = sigma_sq * np.linalg.inv(Precision)

            mu_post = np.linalg.inv(Precision) @ M_TM.T @ y_train
            y_pred = M_test_M @ mu_post

            # Epistemic/Aleatoric algebraic shortcut (avoids brittle JS SVD)
            Sigma_A = sigma_sq * np.linalg.inv(Precision) @ (M_TM.T @ M_TM) @ np.linalg.inv(Precision)
            Sigma_epistemic = Sigma_post - Sigma_A

            var_total = np.diag(M_test_M @ Sigma_post @ M_test_M.T)
            var_epistemic = np.diag(M_test_M @ Sigma_epistemic @ M_test_M.T)
            var_aleatoric = np.diag(M_test_M @ Sigma_A @ M_test_M.T)

            cis = [1.96 * np.sqrt(np.maximum(v, 0)) for v in [var_total, var_epistemic, var_aleatoric]]

            # 4. Plotting
            plt.clf()
            fig, axes = plt.subplots(1, 3, figsize=(15, 5), sharey=True)
            titles = ['Total Credible Interval', 'Epistemic (Data Insufficiency)', 'Aleatoric (Aliasing)']
            colors = ['#2ca02c', '#1f77b4', '#d62728']

            for i in range(3):
                ax = axes[i]
                ax.plot(t_test, y_test_true, 'k--', alpha=0.4, label='True Signal')
                ax.scatter(t_train, y_train, color='black', s=30, zorder=5, label='Train')
                ax.plot(t_test, y_pred, color=colors[i], lw=3, label='MAP')
                ax.fill_between(t_test, y_pred - cis[i], y_pred + cis[i], color=colors[i], alpha=0.3)
                ax.set_title(titles[i])
                ax.grid(True, alpha=0.2)
                ax.set_ylim(-10, 10)
                if i == 0: ax.legend()

            plt.tight_layout()
            
            # Display plot in HTML
            display(fig, target="plot-container", append=False)

        # 5. Bind HTML sliders to the Python update function
        update_proxy = create_proxy(update_plot)
        document.getElementById('d-slider').addEventListener('input', update_proxy)
        document.getElementById('n-slider').addEventListener('input', update_proxy)
        document.getElementById('sig-slider').addEventListener('input', update_proxy)
        document.getElementById('tau-slider').addEventListener('input', update_proxy)

        # Run once on load
        update_plot()
    </script>
</body>
</html>
